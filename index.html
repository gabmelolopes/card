<!-- ! para gerar código inicial -->
<!DOCTYPE html>
<!-- mudar para pt-br -->
<html lang="pt-br"> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Título -->
    <title>Card - Redes Sociais</title>

    <!-- Chamada da css com o ./css/styles.css -->
     <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <!--  div para primeira div / criar atributo class na div = container--> 
    <div class="container">
        <!-- img src - local da imagem e um alt - explicando o que é -->
        <img src="./images/photo.png" alt="Foto da Valéria Muniz">
        <!-- h1 - fonte maior / h2 - fonte um pouco menor / p - paragrafo -->
        <h1>Valéria Muniz</h1>
        <h2>São Paulo, Brasil</h2>
        <p>Front-End Senior and avid reader</p>
        <!-- ol / li / href - para colocar o endereço / target="_blank">nome href -->
        <ol>
            <li><a href="http://github.com/gitisra" target="_blank">GitHub</a></li>
            <li><a href="http://dribbble.com" target="_blank">Dribbble</a></li>
            <li><a href="http://linkedin.com" target="_blank">Linkedin</a></li>
            <li><a href="http://instagram.com" target="_blank">Instagram</a></li>
            <li><a href="http://x.com" target="_blank">X</a></li>
        </ol>
    </div>
    
</body>
</html>
